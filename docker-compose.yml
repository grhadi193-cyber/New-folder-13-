services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-farzamback-farazmgps.runflare.run}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-False}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://farazmgps.runflare.run}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://farzamback-farazmgps.runflare.run,https://farazmgps.runflare.run}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://farazmgps.runflare.run}
      PAYMENT_CALLBACK_BASE_URL: ${PAYMENT_CALLBACK_BASE_URL:-https://farzamback-farazmgps.runflare.run/api/payment/callback}
      PAYMENT_SANDBOX: ${PAYMENT_SANDBOX:-True}
      ZARINPAL_MERCHANT_CODE: ${ZARINPAL_MERCHANT_CODE:-sandbox}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-2}
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - media:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://farzamback-farazmgps.runflare.run}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://farazmgps.runflare.run}
        INTERNAL_API_URL: http://backend:8000
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://farzamback-farazmgps.runflare.run}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://farazmgps.runflare.run}
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  media:
