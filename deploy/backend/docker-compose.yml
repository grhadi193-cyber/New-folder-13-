services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ati_farzam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      USE_SSL: "False"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ati_farzam
      ALLOWED_HOSTS: 95.38.161.104,localhost,127.0.0.1,backend
      CORS_ALLOW_ALL_ORIGINS: "True"
      CORS_ALLOWED_ORIGINS: http://95.38.161.205
      CSRF_TRUSTED_ORIGINS: http://95.38.161.205
      FRONTEND_BASE_URL: http://95.38.161.205
      PAYMENT_CALLBACK_BASE_URL: http://95.38.161.104/api/payment/callback
      PAYMENT_SANDBOX: "True"
      ZARINPAL_MERCHANT_CODE: sandbox
      OTP_EXPIRY_MINUTES: 2
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media:/app/media

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  media:
  pgdata:
