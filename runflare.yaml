# Runflare Configuration for ATi Farzam GPS Tracker
# Documentation: https://runflare.com/docs/get-started/

project:
  name: ati-farzam
  description: ATi Farzam Iranian GPS Tracker Shop

services:
  # Backend Service (Django)
  - name: backend
    type: django
    path: ./backend
    build:
      command: |
        pip install -r requirements.txt
    start:
      command: /entrypoint.sh
    ports:
      - 8000
    env:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=django-insecure-k8$2m#xq!v@9n^p&3w*r7j+5h=2f!g6u4i1o0a9s8d7f6g5h4j3k2l1z0x9c8v7b6n5m4
      - DATABASE_URL=postgresql://postgres:xXmTsf7AnLBjo4tW4Jfl@farzamsql-trv-service:5432/farzamsqevi_db
      - DEBUG=False
      - ALLOWED_HOSTS=farzamback-farazmgps.runflare.run,localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=https://farazmgps.runflare.run
      - CSRF_TRUSTED_ORIGINS=https://farzamback-farazmgps.runflare.run,https://farazmgps.runflare.run
    disk:
      - name: media
        path: /app/media
        size: 5GB
      - name: static
        path: /app/public/static
        size: 1GB

  # Frontend Service (Next.js)
  - name: frontend
    type: nextjs
    path: ./frontend
    build:
      command: |
        npm install
        npm run build
    start:
      command: npm start
    ports:
      - 3000
    env:
      - NEXT_PUBLIC_API_URL=https://farzamback-farazmgps.runflare.run
      - NEXT_PUBLIC_SITE_URL=https://farazmgps.runflare.run

databases:
  - name: postgres
    type: postgres
    version: "16"
    size: 5GB

cron:
  - name: migrate
    command: python manage.py migrate --noinput
    service: backend
    trigger: on_deploy
