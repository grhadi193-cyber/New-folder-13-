# Runflare Configuration for ATi Farzam GPS Tracker
# Documentation: https://runflare.com/docs/get-started/

project:
  name: ati-farzam
  description: ATi Farzam Iranian GPS Tracker Shop

services:
  # Backend Service (Django)
  - name: backend
    type: django
    path: ./backend
    build:
      command: |
        pip install -r requirements.txt
    start:
      command: /entrypoint.sh
    ports:
      - 8000
    env:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=False
      - USE_SSL=True
      - ALLOWED_HOSTS=farzamback-farazmgps.runflare.run,localhost
      - CORS_ALLOW_ALL_ORIGINS=False
      - CORS_ALLOWED_ORIGINS=https://farazmgps.runflare.run
      - CSRF_TRUSTED_ORIGINS=https://farzamback-farazmgps.runflare.run,https://farazmgps.runflare.run
      - FRONTEND_BASE_URL=https://farazmgps.runflare.run
      - PAYMENT_CALLBACK_BASE_URL=https://farzamback-farazmgps.runflare.run/api/payment/callback
      - PAYMENT_SANDBOX=True
      - ZARINPAL_MERCHANT_CODE=sandbox
      - OTP_EXPIRY_MINUTES=2
    disk:
      - name: media
        path: /app/media
        size: 5GB
      - name: static
        path: /app/staticfiles
        size: 1GB

  # Frontend Service (Next.js)
  - name: frontend
    type: nextjs
    path: ./frontend
    build:
      command: |
        npm install
        npm run build
    start:
      command: npm start
    ports:
      - 3000
    env:
      - NEXT_PUBLIC_API_URL=https://farzamback-farazmgps.runflare.run
      - NEXT_PUBLIC_SITE_URL=https://farazmgps.runflare.run

databases:
  - name: postgres
    type: postgres
    version: "16"
    size: 5GB

cron:
  - name: migrate
    command: python manage.py migrate --noinput
    service: backend
    trigger: on_deploy
